version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: voucher-backend
    ports:
      - "3001:3001"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DB_PATH=/app/data/vouchers.db
      - NODE_ENV=production
    networks:
      - voucher-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: voucher-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001
    networks:
      - voucher-network
    restart: unless-stopped

networks:
  voucher-network:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
